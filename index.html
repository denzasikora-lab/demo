<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой сайт</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      margin: 20px;
    }

    h1 {
      margin-top: 0;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #222;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    a:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>Привет! Это мой сайт</h1>

    <p>
      Сайт опубликован бесплатно через GitHub Pages.
    </p>

    <a href="https://github.com/" target="_blank" rel="noopener noreferrer">
      Мой GitHub
    </a>
  </main>
</body>
</html>
